<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyalophysis — Acceso a la Plataforma</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    
    <style>
        /* Ajustes específicos para centrar la tarjeta de autenticación */
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card-auth {
            width: 100%;
            max-width: 480px;
            border-radius: 20px;
        }
        .nav-link-auth {
            color: var(--text-muted) !important;
            border: none !important;
            background: transparent !important;
            font-weight: 600;
            padding-bottom: 10px;
        }
        .nav-link-auth.active {
            color: #FFFFFF !important;
            border-bottom: 2px solid var(--accent-cyan) !important;
        }
        .form-control-dark {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--glass-border);
            color: #FFFFFF;
        }
        .form-control-dark:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent-cyan);
            color: #FFFFFF;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
        }
        .form-select-dark {
            background-color: rgba(21, 28, 52, 0.9);
            color: #FFFFFF;
            border: 1px solid var(--glass-border);
        }
        .form-select-dark:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
        }
    </style>
</head>
<body>

    <div class="aurora-bg"></div>

    <div class="container auth-container">
        <div class="card-glass card-auth p-4 p-sm-5 shadow-lg">
            
            <div class="text-center mb-4">
                <h1 class="h3 fw-bold tracking-tight d-flex align-items-center justify-content-center mb-1">
                    <span class="brand-accent-h me-2">H</span> HYALOPHYSIS
                </h1>
                <p class="small text-muted-custom">Mueve la aguja hacia las metas globales</p>
            </div>

            <ul class="nav nav-tabs justify-content-center gap-4 mb-4 border-0" id="authTabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link nav-link-auth active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login-panel" type="button" role="tab">Sign In</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link nav-link-auth" id="register-tab" data-bs-toggle="tab" data-bs-target="#register-panel" type="button" role="tab">Sign Up</button>
                </li>
            </ul>

            <div class="tab-content" id="authTabsContent">
                
                <div class="tab-pane fade show active" id="login-panel" role="tabpanel">
                    <form action="index.html" method="GET">
                        <div class="mb-3">
                            <label class="form-label small text-light-custom">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text form-control-dark border-end-0"><i class="bi bi-envelope text-muted-custom"></i></span>
                                <input type="email" class="form-control form-control-dark border-start-0" placeholder="name@example.com" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <div class="d-flex justify-content-between">
                                <label class="form-label small text-light-custom">Password</label>
                                <a href="#" class="small text-accent text-decoration-none" style="font-size: 0.8rem;">Forgot?</a>
                            </div>
                            <div class="input-group">
                                <span class="input-group-text form-control-dark border-end-0"><i class="bi bi-lock text-muted-custom"></i></span>
                                <input type="password" class="form-control form-control-dark border-start-0" placeholder="••••••••" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-accent-action w-100 py-2 fw-semibold">
                            Enter Dashboard <i class="bi bi-arrow-right-short ms-1"></i>
                        </button>
                    </form>
                </div>

                <div class="tab-pane fade" id="register-panel" role="tabpanel">
                    <form action="index.html" method="GET">
                        <div class="mb-3">
                            <label class="form-label small text-light-custom">Full Name</label>
                            <input type="text" class="form-control form-control-dark" placeholder="John Doe" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small text-light-custom">Email</label>
                            <input type="email" class="form-control form-control-dark" placeholder="john@example.com" required>
                        </div>
                        
                        <div class="row g-2 mb-3">
                            <div class="col-6">
                                <label class="form-label small text-light-custom">Actor Profile</label>
                                <select class="form-select form-control-dark form-select-dark" required>
                                    <option value="citizen">Citizen</option>
                                    <option value="ngo">NGO</option>
                                    <option value="enterprise">Enterprise</option>
                                    <option value="government">Government</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <label class="form-label small text-light-custom">Age Segment</label>
                                <select class="form-select form-control-dark form-select-dark" required>
                                    <option>18 - 30 years</option>
                                    <option>31 - 50 years</option>
                                    <option>+50 years</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label small text-light-custom">Geographic Environment</label>
                            <select class="form-select form-control-dark form-select-dark" required>
                                <option>Urbano (Gran Ciudad)</option>
                                <option>Semi-urbano</option>
                                <option>Rural / Comunidad Aislada</option>
                            </select>
                            <div class="form-text text-muted-custom" style="font-size: 0.75rem;">
                                Used to balance and tailor daily ODS challenges.
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold border-0" style="background: linear-gradient(135deg, #00F2FE, #4FACFE); color: #070B19;">
                            Create Contextual Account <i class="bi bi-check-circle-fill ms-1"></i>
                        </button>
                    </form>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
